name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build hooks
        run: npm run build:hooks

      - name: Run tests
        run: npm test

      - name: Run infrastructure tests
        run: npm run test:infra

      - name: Run upstream gsd-tools tests
        run: npm run test:upstream

      - name: Run fork gsd-tools tests
        run: npm run test:upstream:fork

      - name: Verify install script
        run: |
          # Create isolated temp directory simulating fresh install
          INSTALL_DIR=$(mktemp -d)

          # Run install.js with --claude flag and HOME pointing to temp dir
          # This tests the installer works without actually modifying the real home
          HOME="$INSTALL_DIR" node bin/install.js --claude 2>&1 || true

          # Verify expected directories were created
          if [ -d "$INSTALL_DIR/.claude/commands/gsdr" ]; then
            echo "Install verification: PASS - commands/gsdr directory created"
          else
            echo "Install verification: FAIL - commands/gsdr directory not found"
            ls -la "$INSTALL_DIR/.claude/" 2>/dev/null || echo "No .claude directory at all"
            exit 1
          fi

          if [ -d "$INSTALL_DIR/.claude/get-shit-done-reflect" ]; then
            echo "Install verification: PASS - get-shit-done-reflect directory created"
          else
            echo "Install verification: FAIL - get-shit-done-reflect directory not found"
            exit 1
          fi

          # Check VERSION file was written
          if [ -f "$INSTALL_DIR/.claude/get-shit-done-reflect/VERSION" ]; then
            VERSION=$(cat "$INSTALL_DIR/.claude/get-shit-done-reflect/VERSION")
            PKG_VERSION=$(node -p "require('./package.json').version")
            echo "Install verification: PASS - VERSION file exists ($VERSION)"
            if [ "$VERSION" = "$PKG_VERSION" ]; then
              echo "Install verification: PASS - Version matches package.json"
            else
              echo "Install verification: WARN - Version mismatch ($VERSION vs $PKG_VERSION)"
            fi
          fi

          # Cleanup
          rm -rf "$INSTALL_DIR"
          echo "Install verification: COMPLETE"

      - name: Run tests with coverage
        if: github.event_name == 'pull_request'
        run: npm run test:coverage

      - name: GATE-01 emission marker
        if: always()
        run: |
          # GATE-01: CI status gate for phase advancement.
          # This step is the workflow-level fire-event emitter for Phase 58 Plan 19's
          # `gate_fire_events` extractor. It must run last so `job.status` reflects the
          # outcome of all preceding test + install-verify steps.
          PHASE_REF="${{ github.base_ref || github.ref_name }}"
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice title=GATE-01::gate_fired=GATE-01 result=pass phase=${PHASE_REF}"
          else
            echo "::notice title=GATE-01::gate_fired=GATE-01 result=block phase=${PHASE_REF}"
            echo "::error::GATE-01 blocks phase advancement — one or more required checks failed"
            exit 1
          fi
